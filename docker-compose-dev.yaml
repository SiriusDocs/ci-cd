services:
  postgres:
    image: 'postgres:17.6'
    container_name: sirius-docs_mainDB
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - './pgdata:/var/lib/postgresql/data/pgdata'
    command: |
      postgres 
              -c max_connections="200"
              -c shared_buffers="3GB"
              -c effective_cache_size="9GB"
              -c maintenance_work_mem="768MB"
              -c checkpoint_completion_target="0.9"
              -c wal_buffers="16MB"
              -c default_statistics_target="100"
              -c random_page_cost="1.1"
              -c effective_io_concurrency="200"
              -c work_mem="15123kB"
              -c huge_pages="off"
              -c min_wal_size="1GB"
              -c max_wal_size="4GB"
              -c max_worker_processes="8"
              -c max_parallel_workers_per_gather="4"
              -c max_parallel_workers="8"
              -c max_parallel_maintenance_workers="4"

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - server-side
    tty: true
    stdin_open: true

  template_service_migrator:
    build:
      context: backend/template_service
      dockerfile: template_service_migrator.Dockerfile
    env_file: template_service.env
    networks:
      - server-side
    command: |
      /app/migrator 
        -db-url="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}?sslmode=disable" 
        -migrations-path=./migrations 
        -migrations-table=temp 
        --level=up
    depends_on:
      postgres:
        condition: service_healthy

  template_service:
    restart: always
    build:
      context: backend/template_service
      dockerfile: template_service.Dockerfile
    env_file: template_service.env
    networks:
      - server-side
    volumes:
      - ./template_service.env:/app/.env
      - ./yaml/template_service.yaml:/app/configs/server/local.yaml
    depends_on:
      template_service_migrator:
        condition: service_completed_successfully
  
  auth_service_migrator:
    build:
      context: backend/auth_service
      dockerfile: auth_service_migrator.Dockerfile
    env_file: auth_service.env
    networks:
      - server-side
    command: |
      /app/migrator 
        -db-url="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}?sslmode=disable" 
        -migrations-path=./migrations 
        -migrations-table=auth 
        --level=up
    depends_on:
      postgres:
        condition: service_healthy
      template_service:
        condition: service_started

  auth_service:
    restart: always
    build:
      context: backend/auth_service
      dockerfile: auth_service.Dockerfile
    env_file: auth_service.env
    networks:
      - server-side
    volumes:
      - ./auth_service.env:/app/.env
      - ./yaml/auth_service.yaml:/app/configs/server/local.yaml
    depends_on:
      postgres:
        condition: service_healthy
      auth_service_migrator:
        condition: service_completed_successfully

  api_gateway:
    restart: always
    build:
      context: backend/api_gateway
      dockerfile: api_gateway.Dockerfile
    env_file: api_gateway.env
    networks:
      - client-side
      - server-side
    volumes:
      - ./api_gateway.env:/app/.env
      - ./yaml/api_gateway.yaml:/app/configs/server/local.yaml
    ports:
      - 3000:8080
    depends_on:
      postgres:
        condition: service_healthy
      auth_service:
        condition: service_started

  frontend:
    restart: always
    build:
      context: frontend
      dockerfile: ./Dockerfile
    env_file:
      - frontend.env
    ports:
      - 8888:8080
    networks:
      - client-side
    
networks:
  server-side: {}
  client-side: {}
